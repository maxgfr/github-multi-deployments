name: 'action-test-remote'

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  deployments: write

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - name: 'Test: start deployment'
        uses: maxgfr/github-multi-deployments@main
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          desc: Deploying remote environment
          env: env-remote-${{ github.run_id }}
          auto_inactive: 'true'
          debug: true

      - name: 'Test: finish deployment'
        uses: maxgfr/github-multi-deployments@main
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: success
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          debug: true

      - name: Cleanup - delete environment
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/environments/env-remote-${{ github.run_id }}" 2>&1 || true
