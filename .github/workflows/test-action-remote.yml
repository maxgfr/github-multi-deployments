name: 'action-test-remote'

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - name: 'Test: start deployment'
        uses: maxgfr/github-multi-deployments@main
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          desc: Deploying remote environment
          env: env-remote-${{ github.run_id }}
          auto_inactive: 'true'
          debug: true

      - name: 'Test: finish deployment'
        uses: maxgfr/github-multi-deployments@main
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: success
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          debug: true

      - name: Cleanup
        if: always()
        continue-on-error: true
        uses: maxgfr/github-multi-deployments@main
        with:
          step: deactivate-env
          token: ${{ secrets.GITHUB_TOKEN }}
          env: env-remote-${{ github.run_id }}
