name: GitHub Multi Deployments
description: Github action which lets you to handle deployments status with multiple environments
author: maxgfr
branding:
  icon: bookmark
  color: blue
runs:
  using: node24
  main: dist/index.js

inputs:
  token:
    required: true
    description: GitHub token
  step:
    required: true
    description: "One of 'start', 'finish', 'deactivate-env', 'delete-env', 'get-env'"
  desc:
    required: false
    description: Description to set in status
  ref:
    required: false
    description: The git ref to use for the deploy, defaults to `github.ref or github.head_ref`
  repository:
    required: false
    description: Set status for a different repository, using the format `$owner/$repository` (optional, defaults to the current repository)
  env:
    required: false
    description: The name of the deployment environment for Github. It could be an array of string. (Required for `start`, `deactivate-env` and `delete-env`)
  deployment_id:
    required: false
    description: The deployment id to update. Can be a JSON array of deployment objects or a single ID. (Required for `finish`)
  env_url:
    required: false
    description: The environment URL. It could be an array of string. (For `finish` only)
  status:
    required: false
    description: The deployment status. (For `finish` only)
  payload:
    required: false
    description: JSON payload with extra information about the deployment. (For `start` only)
  auto_inactive:
    required: false
    description: "Automatically mark previous deployments as inactive via GitHub API, skipping manual deactivation. Set to 'true' to enable. (For `start` only)"
    default: 'false'
  log_url:
    required: false
    description: Custom URL for deployment logs. Defaults to the commit checks page.
  transient_environment:
    required: false
    description: "Mark the environment as transient (will be destroyed). Set to 'false' for permanent environments like production. Default: 'true'."
    default: 'true'
  production_environment:
    required: false
    description: "Mark the deployment as a production environment. Set to 'true' to enable. Default: 'false'."
    default: 'false'
  continue_on_error:
    required: false
    description: "Continue deploying to other environments when one fails (multi-env). Partial successes are output with warnings. Default: 'false'."
    default: 'false'
  dry_run:
    required: false
    description: "Enable dry-run mode. Logs what would happen without making API calls. Set to 'true' to enable."
    default: 'false'
  debug:
    required: false
    description: Print arguments used by this action.

outputs:
  deployment_id:
    description: JSON array of deployment objects with IDs and environment information (from `start` and `finish` steps)
  env:
    description: "The environment(s) for the deployment. For `start`: the original input value. For `get-env`: JSON array of environment names."
